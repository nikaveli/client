name: Weekly prospect audits

on:
  schedule:
    # Mondays 8:00 AM Denver time (14:00 UTC). Edit the cron to change cadence.
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'new = find fresh prospects; reaudit = re-run a market already audited'
        type: choice
        options:
          - new
          - reaudit
        default: new
      category:
        description: Business category (e.g. restaurant, dentist, salon)
        default: restaurant
      city:
        description: City
        default: Denver
      state:
        description: State code
        default: CO
      limit:
        description: Max businesses, up to 50 (ignored for reaudit)
        default: '10'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to commit the audited-businesses registry back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run prospect audit
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: >
          node tools/prospect-audit.js
          ${{ github.event.inputs.mode == 'reaudit' && '--reaudit' || '' }}
          --category "${{ github.event.inputs.category || 'restaurant' }}"
          --city "${{ github.event.inputs.city || 'Denver' }}"
          --state "${{ github.event.inputs.state || 'CO' }}"
          --limit "${{ github.event.inputs.limit || '10' }}"

      - name: Upload audit PDFs
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-${{ github.run_number }}
          path: audit-reports/
          retention-days: 90

      - name: Save audited-businesses registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audited-businesses.json
          git diff --cached --quiet || git commit -m "Update audited businesses registry"
          git push
